name: Android CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Create debug keystore
        run: |
          keytool -genkeypair -v -keystore app/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Debug, OU=Debug, O=Debug, L=Debug, ST=Debug, C=US"
          
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        
      - name: Build debug APK
        run: ./gradlew assembleDebug
        
      - name: Build release APK
        run: ./gradlew assembleRelease
        
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Dynotifs-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          
      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: Dynotifs-V1-QA
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/app-release.apk
          tag_name: v1.0.1
          name: Dynotifs v1.0.1
          body: |
            ## Dynotifs v1.0.1 - Bug Fixes Release
            
            ### What's Fixed:
            - Calibration now applies to overlay position
            - Y slider allows full screen positioning (0-100%)
            - Music/media category notifications now display
            - Removed Google Play Services blocklist
            
            ### Known Issues:
            - Hole punch camera mask not yet implemented
            
            ### Installation:
            1. Download the APK below
            2. Enable "Install from unknown sources" in settings
            3. Install and grant permissions (Overlay, Notification Listener)
            
            Built with 💪 by @suprxsidh
          draft: false
        continue-on-error: true